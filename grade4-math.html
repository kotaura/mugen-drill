<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4年生 算数ドリル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'M PLUS Rounded 1c', 'Zen Maru Gothic', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8faff 0%, #eef2ff 50%, #f0f9ff 100%);
            color: #1e293b;
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 48px;
            -webkit-tap-highlight-color: transparent;
        }
        rt { font-size: 0.5em; color: #94a3b8; font-weight: normal; }

        .app-header { width:100%; max-width:960px; padding:24px 24px 0; display:flex; align-items:center; gap:12px; }
        .app-logo { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#6366f1,#3b82f6); display:flex; align-items:center; justify-content:center; color:white; font-size:1.2rem; font-weight:900; flex-shrink:0; box-shadow:0 4px 12px rgba(99,102,241,.35); }
        .app-title { font-size:1.1rem; font-weight:800; color:#1e293b; }
        .app-sub   { font-size:0.75rem; color:#94a3b8; font-weight:500; }
        .app-home  { margin-left:auto; text-decoration:none; font-size:.78rem; font-weight:700; color:#6366f1; background:white; padding:8px 14px; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
        .app-home:hover { background:#f1f5f9; }

        .tab-wrap { width:100%; max-width:960px; padding:20px 24px 0; }
        .tab-scroll { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
        .tab-scroll::-webkit-scrollbar { display:none; }
        .tab-btn { padding:8px 14px; border-radius:10px; border:none; cursor:pointer; font-weight:700; font-size:.8rem; white-space:nowrap; font-family:'Zen Maru Gothic',sans-serif; background:white; color:#94a3b8; box-shadow:0 1px 4px rgba(0,0,0,.08); transition:all .18s; }
        .tab-btn:hover { background:#f1f5f9; color:#475569; }
        .tab-btn.active { background:linear-gradient(135deg,#6366f1,#3b82f6); color:white; box-shadow:0 4px 12px rgba(99,102,241,.35); }

        .controls { width:100%; max-width:960px; padding:14px 24px; display:flex; gap:8px; flex-wrap:wrap; }
        .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 16px; border-radius:10px; border:none; cursor:pointer; font-weight:700; font-size:.82rem; font-family:'Zen Maru Gothic',sans-serif; transition:all .18s; box-shadow:0 2px 8px rgba(0,0,0,.1); }
        .btn:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.15); }
        .btn-primary { background:linear-gradient(135deg,#6366f1,#3b82f6); color:white; }
        .btn-danger  { background:linear-gradient(135deg,#f43f5e,#fb923c); color:white; }
        .btn-success { background:linear-gradient(135deg,#10b981,#06b6d4); color:white; }
        .btn-slate   { background:#334155; color:white; }
        .btn-amber   { background:linear-gradient(135deg,#f59e0b,#f97316); color:white; }

        .sheet-wrap { width:100%; display:flex; justify-content:center; padding:0 12px; }
        .sheet { background:white; width:210mm; min-height:297mm; padding:12mm 15mm 10mm; border-radius:16px; box-shadow:0 0 0 1px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.08),0 32px 64px rgba(0,0,0,.06); display:none; flex-direction:column; }
        .sheet.active { display:flex; }
        @media (max-width:640px) { .sheet { width:100%; min-height:auto; padding:12px; border-radius:12px; } }

        .sheet-header { display:flex; justify-content:space-between; align-items:flex-end; padding-bottom:9px; border-bottom:2px solid #e2e8f0; margin-bottom:9px; flex-shrink:0; }
        .sheet-grade { font-size:.68rem; font-weight:700; color:#94a3b8; margin-bottom:2px; }
        .sheet-title { font-size:1.35rem; font-weight:900; color:#0f172a; }
        .sheet-meta  { display:flex; align-items:flex-end; gap:7px; flex-shrink:0; }
        .meta-field  { display:flex; align-items:flex-end; gap:3px; }
        .meta-label  { font-size:.7rem; font-weight:700; color:#64748b; padding-bottom:2px; }
        .meta-input  { border:none; border-bottom:1.5px solid #cbd5e1; background:transparent; font-size:.9rem; font-weight:700; color:#0f172a; outline:none; padding:0 2px; text-align:center; font-family:'M PLUS Rounded 1c',sans-serif; }
        .meta-input.w-sm   { width:32px; }
        .meta-input.w-name { width:110px; text-align:left; }
        .meta-input:focus { border-bottom-color:#6366f1; }

        .score-bar   { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
        .score-pill  { display:inline-flex; align-items:center; gap:4px; background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:8px; padding:3px 10px; }
        .score-label { font-size:.68rem; font-weight:700; color:#94a3b8; }
        .score-val   { font-size:1.15rem; font-weight:900; color:#f43f5e; font-family:monospace; min-width:2.4rem; text-align:right; }
        .score-denom { font-size:.78rem; font-weight:700; color:#cbd5e1; }
        .hint-text   { font-size:.66rem; color:#94a3b8; font-weight:600; }

        /* layouts */
        .grid-2col { display:grid; grid-template-columns:1fr 1fr; gap:0 24px; flex-grow:1; }
        .prob-col  { display:flex; flex-direction:column; justify-content:space-between; }
        .prob-h    { display:flex; align-items:center; gap:4px; padding:4px 0; border-bottom:1px solid #f1f5f9; font-size:1rem; flex-wrap:wrap; }
        .prob-num  { font-size:.72rem; font-weight:700; color:#cbd5e1; width:1.7rem; flex-shrink:0; }

        /* 計算問題：3列 */
        .grid-3col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0 20px; flex-grow:1; }

        /* 分数 */
        .frac { display:inline-flex; flex-direction:column; align-items:center; line-height:1.1; margin:0 2px; vertical-align:middle; }
        .frac .fn { border-bottom:1.5px solid #334155; padding:0 2px; font-size:.9rem; min-width:1.2rem; text-align:center; }
        .frac .fd { padding:0 2px; font-size:.9rem; min-width:1.2rem; text-align:center; }

        /* 図形レイアウト */
        .shape-layout { display:grid; grid-template-columns:1fr 1fr; gap:12px 18px; flex-grow:1; align-content:start; }
        .shape-item { display:flex; flex-direction:column; background:#fafbff; border:1.5px solid #e0e7ff; border-radius:14px; padding:10px 14px 8px; gap:6px; }
        .shape-header { display:flex; align-items:center; gap:8px; }
        .shape-num   { font-size:.72rem; font-weight:800; color:#6366f1; }
        .shape-label { font-size:.8rem; color:#475569; font-weight:600; }
        .shape-figure { display:flex; justify-content:center; align-items:center; height:128px; overflow:visible; }
        .shape-formula { font-size:.72rem; color:#94a3b8; font-weight:600; min-height:1.1em; }
        .shape-ans   { display:flex; align-items:center; gap:8px; font-size:.9rem; padding-top:5px; border-top:1px dashed #e0e7ff; margin-top:auto; }

        /* 文章題 */
        .grid-story { display:flex; flex-direction:column; flex-grow:1; gap:7px; }
        .prob-story { display:flex; align-items:flex-start; gap:10px; background:#fafbff; border:1.5px solid #e8ecf8; border-radius:12px; padding:9px 12px; }
        .prob-badge { background:linear-gradient(135deg,#6366f1,#3b82f6); color:white; border-radius:50%; width:21px; height:21px; display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:800; flex-shrink:0; margin-top:1px; }
        .story-body { flex-grow:1; }
        .story-txt  { font-size:.92rem; line-height:1.75; }
        .story-ans  { display:flex; align-items:center; gap:6px; margin-top:4px; font-size:.88rem; flex-wrap:wrap; }

        /* 総合 */
        .grid-mixed { display:grid; grid-template-columns:1fr 1fr; gap:7px 18px; flex-grow:1; align-content:start; }
        .prob-mixed { display:flex; align-items:center; gap:5px; flex-wrap:wrap; background:#fafbff; border:1.5px solid #e8ecf8; border-radius:10px; padding:6px 9px; font-size:.88rem; row-gap:4px; }
        .mbadge { font-size:.58rem; font-weight:800; padding:2px 6px; border-radius:9999px; white-space:nowrap; flex-shrink:0; }

        /* input */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
        input[type=number] { -moz-appearance:textfield; }
        .box { font-family:'M PLUS Rounded 1c',sans-serif; font-weight:700; border:2px solid #e2e8f0; border-radius:8px; outline:none; background:#f8fafc; text-align:center; transition:all .15s; color:#0f172a; }
        .box:focus { border-color:#6366f1; background:#eef2ff; transform:scale(1.04); z-index:5; }
        .box.correct   { border-color:#cbd5e1; background:#f8fafc; }
        .box.incorrect { border-color:#f43f5e; background:#fff1f2; color:#e11d48; }
        .bxs  { width:2.8rem; height:1.9rem; font-size:.9rem; }
        .bxm  { width:3.5rem; height:2rem;   font-size:.95rem; }
        .bxl  { width:4.5rem; height:2.1rem; font-size:1rem; }
        .bxtri{ width:5rem;   height:2.1rem; font-size:1rem; }
        .bxst { width:5rem;   height:2rem;   font-size:.95rem; }
        .bxfrac{ width:2.6rem; height:1.8rem; font-size:.85rem; }

        .inp-wrap { position:relative; display:inline-block; }
        .mark { position:absolute; top:50%; left:55%; transform:translate(-50%,-50%) scale(0); width:28px; height:28px; border:3px solid #f43f5e; border-radius:50%; pointer-events:none; opacity:0; transition:transform .28s cubic-bezier(.175,.885,.32,1.275),opacity .28s; z-index:20; }
        .mark.show { opacity:.75; transform:translate(-50%,-50%) scale(1); }

        

/* Answer print labels: use flexible text instead of fixed-width input boxes. */
.answer-text {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:2.9rem;
    min-height:1.95rem;
    max-width:100%;
    padding:2px 8px;
    border:2px solid #fca5a5;
    border-radius:8px;
    background:#fff;
    color:#e11d48;
    font-weight:900;
    line-height:1.25;
    text-align:center;
    white-space:normal;
    word-break:keep-all;
    overflow-wrap:anywhere;
    box-shadow:none;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
}
.answer-text.long { justify-content:flex-start; text-align:left; font-size:.86rem; }
.answer-text.xlong { justify-content:flex-start; text-align:left; font-size:.78rem; }
.frac .answer-text { min-width:2.4rem; min-height:1.6rem; padding:0 5px; font-size:.82rem; }
.print-sheet.a-mode .quiz-ans,
.print-sheet.a-mode .story-ans,
.print-sheet.a-mode .prob-h,
.print-sheet.a-mode .prob-mixed { overflow:visible; }

/* toast/modal */
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-16px); background:#f59e0b; color:white; padding:8px 20px; border-radius:9999px; font-weight:700; font-size:.85rem; box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:200; opacity:0; transition:all .25s; pointer-events:none; }
        .toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
        #modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.6); display:flex; justify-content:center; align-items:center; z-index:300; opacity:0; pointer-events:none; transition:opacity .25s; backdrop-filter:blur(4px); }
        #modal-overlay.on { opacity:1; pointer-events:auto; }
        .modal-card { background:white; border-radius:24px; padding:36px 28px; text-align:center; width:400px; max-width:92%; transform:scale(.92); transition:transform .25s; box-shadow:0 24px 64px rgba(0,0,0,.2); }
        #modal-overlay.on .modal-card { transform:scale(1); }
        #confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:100; }
        #print-area { display:none; }

        /* PRINT */
        @media print {
            @page { size:A4; margin:0; }
            body { background:none !important; display:block !important; padding:0 !important; }
            .app-header,.tab-wrap,.controls,.toast,#modal-overlay,#confetti-canvas,.sheet-wrap { display:none !important; }
            #print-area { display:block !important; }
            .print-sheet { display:flex !important; flex-direction:column !important; width:210mm !important; height:297mm !important; padding:12mm 15mm 10mm !important; box-sizing:border-box !important; background:white !important; page-break-after:always; border-radius:0 !important; box-shadow:none !important; }
            .print-sheet:last-child { page-break-after:auto; }
            .print-sheet .grid-2col  { display:grid !important; grid-template-columns:1fr 1fr; gap:0 24px; flex-grow:1; }
            .print-sheet .grid-3col  { display:grid !important; grid-template-columns:1fr 1fr 1fr; gap:0 20px; flex-grow:1; }
            .print-sheet .prob-col   { display:flex !important; flex-direction:column; justify-content:space-between; }
            .print-sheet .grid-story { display:flex !important; flex-direction:column; flex-grow:1; gap:7px; }
            .print-sheet .shape-layout { display:grid !important; grid-template-columns:1fr 1fr; gap:12px 18px; flex-grow:1; align-content:start; }
            .print-sheet .grid-mixed { display:grid !important; grid-template-columns:1fr 1fr; gap:7px 18px; flex-grow:1; align-content:start; }
            .print-sheet .sheet-header { border-bottom:2px solid #e2e8f0 !important; }
            .print-sheet.q-mode input.box { border:2px solid #94a3b8 !important; color:transparent !important; background:white !important; box-shadow:none !important; }
            .print-sheet.q-mode .mark { display:none !important; }
            .print-sheet.a-mode input.box { border:2px solid #f43f5e !important; color:#f43f5e !important; background:white !important; box-shadow:none !important; font-weight:800 !important; -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
            .print-sheet.a-mode .mark { display:none !important; }
            .ans-badge { display:inline-block !important; background:#fff1f2 !important; color:#f43f5e !important; border:1.5px solid #fca5a5 !important; padding:1px 10px; border-radius:9999px; font-size:.66rem; font-weight:800; -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
        }
        .ans-badge { display:none; }
    </style>
</head>
<body>

<div class="app-header">
    <div class="app-logo">算</div>
    <div>
        <div class="app-title">4年生 算数ドリル</div>
        <div class="app-sub">小学4年生（上）</div>
    </div>
    <a href="index.html" class="app-home">↩ ホーム</a>
</div>

<div class="tab-wrap">
    <div class="tab-scroll" id="tab-container"></div>
</div>

<div class="controls">
    <button onclick="app.generateProblems()" class="btn btn-primary">🔄 新しい問題</button>
    <button onclick="app.checkAnswers()"     class="btn btn-danger">💮 答え合わせ</button>
    <button onclick="app.saveImage()"        class="btn btn-success">💾 画像で保存</button>
    <button onclick="app.printQuestion()"    class="btn btn-slate">🖨️ 問題を印刷</button>
    <button onclick="app.printAnswer()"      class="btn btn-amber">📋 解答を印刷</button>
</div>

<div class="sheet-wrap">
    <div id="sheets-container" style="width:100%;max-width:210mm;"></div>
</div>

<div id="print-area"></div>
<div class="toast" id="toast">⚠️ 半角で入力してね</div>
<div id="modal-overlay">
    <div class="modal-card">
        <p style="font-size:.88rem;color:#94a3b8;font-weight:700;margin-bottom:4px;">けっか</p>
        <div id="modal-score" style="font-size:3.8rem;font-weight:900;color:#f43f5e;font-family:monospace;line-height:1.1;margin-bottom:8px;"></div>
        <div id="modal-msg"   style="font-size:1.05rem;font-weight:700;color:#334155;margin-bottom:24px;line-height:1.7;"></div>
        <button onclick="app.closeModal()" class="btn btn-primary" style="margin:0 auto;">とじる</button>
    </div>
</div>
<canvas id="confetti-canvas"></canvas>

<script>
class MathApp {
    constructor() {
        this.tab = 1;
        this.problems = {};
        this.audioCtx = null;

        this.TABS = [
            { id:1, label:'計算問題',       title:'計算問題',               layout:'calc',     count:18 },
            { id:2, label:'分数の計算',     title:'分数の計算（通分あり）',         layout:'frac',     count:16 },
            { id:3, label:'小数の計算',     title:'小数の計算',             layout:'decimal',  count:20 },
            { id:4, label:'角の大きさ',     title:'角の大きさ（内角の計算）',   layout:'angle',    count:12 },
            { id:5, label:'図形の面積',     title:'図形の面積',             layout:'shapes',   count:8  },
            { id:6, label:'数列・植木算',   title:'数列・植木算・周期算',   layout:'sequence', count:9  },
            { id:7, label:'約数',           title:'約数の問題',             layout:'divisor',  count:6  },
            { id:8, label:'総合テスト',     title:'4年生 総合テスト',  layout:'mixed',    count:18 },
            { id:9, label:'大きい数・がい数', title:'大きい数・がい数', layout:'place', count:10 },
            { id:10, label:'単位の変換', title:'単位の変換', layout:'unit', count:10 },
            { id:11, label:'表とグラフ', title:'表とグラフ', layout:'graph', count:8 },
            { id:12, label:'直方体・立方体', title:'直方体と立方体', layout:'solid', count:8 },
        ];

        this.BADGE = {
            'calc':     {bg:'#eff6ff', txt:'#1d4ed8'},
            'frac':     {bg:'#fdf4ff', txt:'#7e22ce'},
            'decimal':  {bg:'#fefce8', txt:'#a16207'},
            'angle':    {bg:'#f0fdf4', txt:'#15803d'},
            'shapes':   {bg:'#eef2ff', txt:'#4338ca'},
            'sequence': {bg:'#f0fdfa', txt:'#0f766e'},
            'divisor':  {bg:'#fff7ed', txt:'#c2410c'},
        };

        this.init();
    }

    init() {
        this.buildNav(); this.buildSheets(); this.setupConfetti();
        this.generateProblems();
        window.addEventListener('resize', () => this.resizeCanvas());
    }

    buildNav() {
        const c = document.getElementById('tab-container');
        this.TABS.forEach(t => {
            const b = document.createElement('button');
            b.id = `tb-${t.id}`; b.className = 'tab-btn'+(t.id===1?' active':'');
            b.textContent = t.label; b.onclick = () => this.switchTab(t.id);
            c.appendChild(b);
        });
    }

    buildSheets() {
        const c = document.getElementById('sheets-container');
        this.TABS.forEach(t => {
            const d = document.createElement('div');
            d.id = `sheet-${t.id}`; d.className = 'sheet'+(t.id===1?' active':'');
            d.innerHTML = this.mkHeader(t) + this.mkBody(t);
            c.appendChild(d);
        });
    }

    mkHeader(t) {
        return `<div class="sheet-header">
            <div><div class="sheet-grade">4年生 算数</div><div class="sheet-title">${t.title}</div></div>
            <div class="sheet-meta">
                <div class="meta-field"><input type="text" class="meta-input w-sm" maxlength="2"><span class="meta-label">年</span></div>
                <div class="meta-field"><input type="text" class="meta-input w-sm" maxlength="2"><span class="meta-label">組</span></div>
                <div class="meta-field"><input type="text" class="meta-input w-sm" maxlength="2"><span class="meta-label">番</span></div>
                <div class="meta-field" style="margin-left:6px"><span class="meta-label">名前</span><input type="text" class="meta-input w-name"></div>
            </div>
        </div>
        <div class="score-bar">
            <span class="hint-text"><span class="ans-badge">★ 解答</span> □に答えを入れてね</span>
            <div class="score-pill"><span class="score-label">点数</span><span class="score-val" id="sc-${t.id}"></span><span class="score-denom">/100</span></div>
        </div>`;
    }

    mkBody(t) {
        const l = t.layout;
        if(l === 'calc')     return `<div id="wr-${t.id}" class="grid-3col"><div class="prob-col" id="ca-${t.id}"></div><div class="prob-col" id="cb-${t.id}"></div><div class="prob-col" id="cc-${t.id}"></div></div>`;
        if(l === 'frac')     return `<div id="wr-${t.id}" class="grid-2col"><div class="prob-col" id="ca-${t.id}"></div><div class="prob-col" id="cb-${t.id}"></div></div>`;
        if(l === 'decimal')  return `<div id="wr-${t.id}" class="grid-2col"><div class="prob-col" id="ca-${t.id}"></div><div class="prob-col" id="cb-${t.id}"></div></div>`;
        if(l === 'angle')    return `<div id="wr-${t.id}" class="grid-2col"><div class="prob-col" id="ca-${t.id}"></div><div class="prob-col" id="cb-${t.id}"></div></div>`;
        if(l === 'shapes')   return `<div id="wr-${t.id}" class="shape-layout"></div>`;
        if(l === 'sequence') return `<div id="wr-${t.id}" class="grid-story"></div>`;
        if(l === 'divisor')  return `<div id="wr-${t.id}" class="grid-story"></div>`;
        if(l === 'mixed')    return `<div id="wr-${t.id}" class="grid-mixed"></div>`;
        if(['place','unit','graph','solid'].includes(l)) return `<div id="wr-${t.id}" class="grid-story"></div>`;
        return '';
    }

    switchTab(id) {
        this.tab = id;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tb-${id}`).classList.add('active');
        document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
        document.getElementById(`sheet-${id}`).classList.add('active');
    }

    /* helpers */
    r(n,d=1){ return Math.round(n*Math.pow(10,d))/Math.pow(10,d); }
    rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
    shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
    toFW(v){ return String(v).replace(/[0-9.+\-]/g,s=>s==='.' ?'．':s==='+'?'＋':s==='-'?'－':String.fromCharCode(s.charCodeAt(0)+0xFEE0)); }
    gcd(a,b){ return b===0?a:this.gcd(b,a%b); }

    generateProblems() {
        this.TABS.forEach(t => {
            this.problems[t.id] = this[`gen_${t.layout}`](t.count);
            this.render(t);
            const el = document.getElementById(`sc-${t.id}`); if(el) el.textContent = '';
        });
        this.closeModal();
    }

    /* 計算問題：掛け算/割り算/カッコ/□埋め の4種ミックス */
    gen_calc(count) {
        const list = [];
        const types = ['mul2','mul3','div2','div3','bracket','blank','law','estimate'];
        for(let i=0;i<count;i++){
            const t = types[i % types.length];
            if(t === 'mul2'){
                const a=this.rnd(11,99), b=this.rnd(11,99);
                list.push({display:`${a} × ${b}`, ans:a*b, type:'calc'});
            } else if(t === 'mul3'){
                const a=this.rnd(100,999), b=this.rnd(2,9);
                list.push({display:`${a} × ${b}`, ans:a*b, type:'calc'});
            } else if(t === 'div2'){
                const b=this.rnd(11,49), ans=this.rnd(2,19), r=this.rnd(0,b-1);
                const a=b*ans+r;
                if(r===0) list.push({display:`${a} ÷ ${b}`, ans:ans, type:'calc'});
                else      list.push({display:`${a} ÷ ${b}`, ans:`${ans}あまり${r}`, displayAns:`${ans}あまり${r}`, type:'div_rem', ansNum:ans, ansRem:r});
            } else if(t === 'div3'){
                const b=this.rnd(2,9), ans=this.rnd(20,120), r=this.rnd(0,b-1), a=b*ans+r;
                if(r===0) list.push({display:`${a} ÷ ${b}`, ans:ans, type:'calc'});
                else list.push({display:`${a} ÷ ${b}`, ans:`${ans}あまり${r}`, displayAns:`${ans}あまり${r}`, type:'div_rem', ansNum:ans, ansRem:r});
            } else if(t === 'bracket'){
                const variants = [
                    () => { const a=this.rnd(2,9),b=this.rnd(2,9),c=this.rnd(10,50),d=this.rnd(2,20); return {display:`(${a} ＋ ${b}) × ${c} ＋ ${d}`, ans:(a+b)*c+d}; },
                    () => { const a=this.rnd(2,9),b=this.rnd(2,9),c=this.rnd(10,50); return {display:`(${a} ＋ ${b}) × ${c}`, ans:(a+b)*c}; },
                    () => { const a=this.rnd(20,80),b=this.rnd(2,15),c=this.rnd(2,9); return {display:`(${a} － ${b}) × ${c}`, ans:(a-b)*c}; },
                    () => { const a=this.rnd(30,99),b=this.rnd(2,8),c=this.rnd(2,8),d=this.rnd(2,8); return {display:`${a} ＋ ${b} × ${c} － ${d}`, ans:a+b*c-d}; },
                    () => { const a=this.rnd(10,50),b=this.rnd(2,9),c=this.rnd(2,9); return {display:`${a} × (${b} ＋ ${c})`, ans:a*(b+c)}; },
                    () => { const a=this.rnd(5,20),b=this.rnd(2,8),c=this.rnd(2,8); return {display:`(${a} ＋ ${b}) × (${c} ＋ ${c})`, ans:(a+b)*(c+c)}; },
                ];
                const v = variants[this.rnd(0,variants.length-1)]();
                list.push({display:v.display, ans:v.ans, type:'calc'});
            } else if(t === 'law'){
                const a=this.rnd(12,80), b=this.rnd(10,60), c=this.rnd(10,60);
                list.push({display:`${a} × (${b} ＋ ${c})`, ans:a*(b+c), type:'calc'});
            } else if(t === 'estimate'){
                const a=this.rnd(1000,9999), place=[10,100,1000][this.rnd(0,2)];
                const ans=Math.round(a/place)*place;
                list.push({display:`${a} を ${place===10?'十':place===100?'百':'千'}の位で四捨五入`, ans:ans, type:'calc'});
            } else {
                const blanks = [
                    () => { const a=this.rnd(10,50),b=this.rnd(5,40),c=a+b; return {display:`${a} ＋ □ ＝ ${c}`, ans:b}; },
                    () => { const b=this.rnd(5,40),c=this.rnd(b+1,b+50); return {display:`□ － ${b} ＝ ${c-b}`, ans:c}; },
                    () => { const a=this.rnd(2,12),c=a*this.rnd(2,12); const b=c/a; return {display:`${a} × □ ＝ ${c}`, ans:b}; },
                    () => { const b=this.rnd(2,9),a=b*this.rnd(2,12); return {display:`${a} ÷ □ ＝ ${b}`, ans:a/b}; },
                    () => { const a=this.rnd(10,90),c=this.rnd(a+1,a+50); return {display:`□ ＋ ${a} ＝ ${c}`, ans:c-a}; },
                    () => { const a=this.rnd(10,50),b=this.rnd(5,45); const c=a-b; if(c<=0) return {display:`□ ＋ 5 ＝ ${a}`, ans:a-5}; return {display:`${a} － □ ＝ ${c}`, ans:b}; },
                ];
                const bl = blanks[this.rnd(0,blanks.length-1)]();
                list.push({display:bl.display, ans:bl.ans, type:'blank'});
            }
        }
        return list;
    }

    /* 分数計算（通分あり・難易度UP） */
    gen_frac(count) {
        const list = [];
        // 通分が必要な分母の組み合わせ（LCMペア）
        const lcmPairs = [[2,3],[2,4],[2,5],[2,6],[3,4],[3,6],[4,6],[2,7],[3,5],[4,5]];
        for(let i=0;i<count;i++){
            const type = i%6;
            if(type===0){
                // 同分母足し算
                const d=this.rnd(4,12), n1=this.rnd(1,d-2), n2=this.rnd(1,d-n1-1);
                const rn=n1+n2, g=this.gcd(rn,d);
                list.push({q:`<span class="frac"><span class="fn">${n1}</span><span class="fd">${d}</span></span> ＋ <span class="frac"><span class="fn">${n2}</span><span class="fd">${d}</span></span> ＝`,
                    numAns:rn/g, denAns:d/g, type:'frac_simple'});
            } else if(type===1){
                // 同分母引き算
                const d=this.rnd(4,12), n1=this.rnd(3,d-1), n2=this.rnd(1,n1-1);
                const rn=n1-n2, g=this.gcd(rn,d);
                list.push({q:`<span class="frac"><span class="fn">${n1}</span><span class="fd">${d}</span></span> － <span class="frac"><span class="fn">${n2}</span><span class="fd">${d}</span></span> ＝`,
                    numAns:rn/g, denAns:d/g, type:'frac_simple'});
            } else if(type===2){
                // 通分が必要な足し算
                const pair=lcmPairs[this.rnd(0,lcmPairs.length-1)];
                const d1=pair[0], d2=pair[1];
                const lcm=d1*d2/this.gcd(d1,d2);
                const n1=this.rnd(1,d1-1), n2=this.rnd(1,d2-1);
                const rn=n1*(lcm/d1)+n2*(lcm/d2);
                const wh=Math.floor(rn/lcm), rem=rn%lcm, g=rem>0?this.gcd(rem,lcm):1;
                if(wh>0){
                    list.push({q:`<span class="frac"><span class="fn">${n1}</span><span class="fd">${d1}</span></span> ＋ <span class="frac"><span class="fn">${n2}</span><span class="fd">${d2}</span></span> ＝`,
                        whole:wh, numAns:rem>0?rem/g:0, denAns:rem>0?lcm/g:1, type:'frac_mixed', isWhole:rem===0, _hint:`（通分：分母${lcm}）`});
                } else {
                    list.push({q:`<span class="frac"><span class="fn">${n1}</span><span class="fd">${d1}</span></span> ＋ <span class="frac"><span class="fn">${n2}</span><span class="fd">${d2}</span></span> ＝`,
                        numAns:rn/g, denAns:lcm/g, type:'frac_simple', _hint:`（通分：分母${lcm}）`});
                }
            } else if(type===3){
                // 通分が必要な引き算
                const pair=lcmPairs[this.rnd(0,lcmPairs.length-1)];
                const d1=pair[0], d2=pair[1];
                const lcm=d1*d2/this.gcd(d1,d2);
                const n1=this.rnd(1,d1-1), n2=this.rnd(1,d2-1);
                const v1=n1*(lcm/d1), v2=n2*(lcm/d2);
                const big=Math.max(v1,v2), small=Math.min(v1,v2);
                const bigD=v1>=v2?d1:d2, bigN=v1>=v2?n1:n2;
                const smD=v1>=v2?d2:d1, smN=v1>=v2?n2:n1;
                const rn=big-small, g=rn>0?this.gcd(rn,lcm):1;
                if(rn<=0){list.push({q:`<span class="frac"><span class="fn">3</span><span class="fd">4</span></span> － <span class="frac"><span class="fn">1</span><span class="fd">2</span></span> ＝`,numAns:1,denAns:4,type:'frac_simple'}); continue;}
                list.push({q:`<span class="frac"><span class="fn">${bigN}</span><span class="fd">${bigD}</span></span> － <span class="frac"><span class="fn">${smN}</span><span class="fd">${smD}</span></span> ＝`,
                    numAns:rn/g, denAns:lcm/g, type:'frac_simple', _hint:`（通分：分母${lcm}）`});
            } else if(type===4){
                // 帯分数足し算（同分母）
                const d=this.rnd(3,8), w1=this.rnd(1,4), n1=this.rnd(1,d-1), w2=this.rnd(1,4), n2=this.rnd(1,d-1);
                const totalN = (w1*d+n1)+(w2*d+n2);
                const whole = Math.floor(totalN/d), rem = totalN%d;
                const g = rem>0 ? this.gcd(rem,d) : 1;
                list.push({q:`${w1}<span class="frac"><span class="fn">${n1}</span><span class="fd">${d}</span></span> ＋ ${w2}<span class="frac"><span class="fn">${n2}</span><span class="fd">${d}</span></span> ＝`,
                    whole, numAns:rem>0?rem/g:0, denAns:rem>0?d/g:1, type:'frac_mixed', isWhole:rem===0});
            } else {
                // 帯分数引き算（同分母）
                const d=this.rnd(3,8), w1=this.rnd(2,5), n1=this.rnd(1,d-1), w2=this.rnd(1,w1-1), n2=this.rnd(1,d-1);
                let totalN = (w1*d+n1)-(w2*d+n2);
                if(totalN<=0){totalN=d+1;}
                const whole = Math.floor(totalN/d), rem = totalN%d;
                const g = rem>0 ? this.gcd(rem,d) : 1;
                list.push({q:`${w1}<span class="frac"><span class="fn">${n1}</span><span class="fd">${d}</span></span> － ${w2}<span class="frac"><span class="fn">${n2}</span><span class="fd">${d}</span></span> ＝`,
                    whole, numAns:rem>0?rem/g:0, denAns:rem>0?d/g:1, type:'frac_mixed', isWhole:rem===0});
            }
        }
        return list;
    }

    /* 小数：足し算・引き算・掛け算 */
    gen_decimal(count) {
        const list = [];
        for(let i=0;i<count;i++){
            const opType = i%4; // 0:足し算 1:引き算 2:掛け算 3:割り算
            if(opType===3){
                const divisor=this.rnd(2,9), quotient=this.r(this.rnd(1,99)/10,1), n1=this.r(divisor*quotient,1);
                list.push({n1,n2:divisor,op:'÷',ans:quotient,isDiv:true});
            } else if(opType===2){
                // 掛け算：小数×整数 or 小数×小数
                const sub=this.rnd(0,1);
                if(sub===0){
                    // 小数×整数
                    const n1=this.r(this.rnd(1,99)/10,1), n2=this.rnd(2,9);
                    list.push({n1,n2,op:'×',ans:this.r(n1*n2,2),isMul:true});
                } else {
                    // 小数×小数（1桁×1桁）
                    const n1=this.r(this.rnd(1,9)/10,1), n2=this.r(this.rnd(1,9)/10,1);
                    list.push({n1,n2,op:'×',ans:this.r(n1*n2,2),isMul:true});
                }
            } else {
                const d1=this.rnd(1,2), d2=this.rnd(1,2);
                const n1=this.r(this.rnd(1,99)/10,d1);
                const n2=this.r(this.rnd(1,99)/10,d2);
                if(opType===0){
                    list.push({n1,n2,op:'+',ans:this.r(n1+n2,2)});
                } else {
                    const a=Math.max(n1,n2), b=Math.min(n1,n2);
                    list.push({n1:a,n2:b,op:'-',ans:this.r(a-b,2)});
                }
            }
        }
        return list;
    }

    /* 角の大きさ：図形の内角問題 */
    gen_angle(count) {
        const list=[];
        const types=['tri_find3rd','tri_find1st','quad_find4th','quad_rect','straight_line','vertically_opp','iso_tri','ext_angle'];
        for(let i=0;i<count;i++){
            const t=types[i%types.length];
            if(t==='tri_find3rd'){
                // 三角形：2角わかって残り1角
                const a=this.rnd(25,85),b=this.rnd(25,85);
                if(a+b>=180){list.push({q:`三角形の2つの角が ${a}°と${b}°のとき、残りの角`,ans:180-a-b<=0?40:180-a-b,prefix:'三角形 ',suffix:'°'}); continue;}
                list.push({q:`三角形の2つの角が ${a}° と ${b}° のとき、残りの角は何度？`,ans:180-a-b,svg:this.mkAngleSVG('triangle',[a,b,180-a-b],2)});
            } else if(t==='tri_find1st'){
                // 直角三角形：1角わかって残り
                const a=this.rnd(20,70);
                list.push({q:`直角三角形の1つの角が ${a}° のとき、もう1つの角は？`,ans:90-a,svg:this.mkAngleSVG('right_tri',[90,a,90-a],2)});
            } else if(t==='quad_find4th'){
                // 四角形：3角わかって残り1角（内角の和360°）
                const a=this.rnd(50,120),b=this.rnd(50,120),c=this.rnd(50,120);
                const d=360-a-b-c;
                if(d<20||d>180){list.push({q:`四角形の3つの角が 80°、90°、100° のとき、残りの角は？`,ans:90,svg:this.mkAngleSVG('quad',[80,90,100,90],3)}); continue;}
                list.push({q:`四角形の3つの角が ${a}°、${b}°、${c}° のとき、残りの角は？`,ans:d,svg:this.mkAngleSVG('quad',[a,b,c,d],3)});
            } else if(t==='quad_rect'){
                // 長方形・正方形の性質利用
                const a=this.rnd(20,70);
                list.push({q:`長方形を対角線で分けたとき、1つの角が ${a}° なら、となりの角は？`,ans:90-a,svg:null});
            } else if(t==='straight_line'){
                // 一直線180°：2角から残り
                const a=this.rnd(25,140),b=this.rnd(10,180-a-10);
                list.push({q:`一直線上に ${a}° と ${b}° があります。残りの角は？`,ans:180-a-b,svg:this.mkAngleSVG('line',[a,b,180-a-b],2)});
            } else if(t==='vertically_opp'){
                // 対頂角
                const a=this.rnd(25,155);
                list.push({q:`2本の直線が交わっています。1つの角が ${a}° のとき、向かいの角（対頂角）は？`,ans:a,svg:null});
            } else if(t==='iso_tri'){
                // 二等辺三角形：頂角→底角
                const apex=this.rnd(20,100);
                const base=(180-apex)/2;
                list.push({q:`二等辺三角形の頂角が ${apex}° のとき、底角は何度？`,ans:base,svg:this.mkAngleSVG('iso_tri',[apex,base,base],0)});
            } else {
                // 外角：三角形の外角＝他の2つの内角の和
                const a=this.rnd(30,70),b=this.rnd(30,70);
                list.push({q:`三角形の2つの角が ${a}° と ${b}° のとき、その外角は？`,ans:a+b,svg:null});
            }
        }
        return list;
    }
    mkAngleSVG(type,angles,hiddenIdx){ return null; } // SVGは問題文で代替

    /* 図形の面積：三角形 + 四角形 */
    gen_shapes(count){
        const list=[];
        const triShapes=['right','acute','obtuse'];
        const quadTypes=['rectangle','parallelogram','trapezoid'];
        for(let i=0;i<count;i++){
            const unit=['cm','m'][this.rnd(0,1)];
            if(i%2===0){
                // 三角形
                const base=this.rnd(4,18), height=this.rnd(4,18);
                const shape=triShapes[i%triShapes.length];
                list.push({kind:'triangle', base, height, unit, ans:base*height/2, shape});
            } else {
                // 四角形
                const qtype=quadTypes[Math.floor(i/2)%quadTypes.length];
                if(qtype==='rectangle'){
                    const w=this.rnd(4,20), h=this.rnd(4,20);
                    list.push({kind:'quad', qtype, w, h, unit, ans:w*h, label:`長方形`});
                } else if(qtype==='parallelogram'){
                    const base=this.rnd(5,20), height=this.rnd(4,16);
                    list.push({kind:'quad', qtype, base, height, unit, ans:base*height, label:`平行四辺形`});
                } else {
                    // 台形
                    const a=this.rnd(4,16), b=this.rnd(4,16), h=this.rnd(4,14);
                    list.push({kind:'quad', qtype, a, b, h, unit, ans:(a+b)*h/2, label:`台形`});
                }
            }
        }
        return list;
    }

    /* 数列・植木算・周期算・等差数列 */
    gen_sequence(count){
        const list=[];
        for(let i=0;i<count;i++){
            const t = i % 3;
            if(t===0){
                // 植木算
                const sub = this.rnd(0,2);
                if(sub===0){
                    const trees=this.rnd(4,20),interval=this.rnd(2,10),total=(trees-1)*interval;
                    list.push({text:`${total}mの道に、はしからはしまで ${interval}mおきに木を植えます。木は何本いりますか。`,ans:trees,unit:'本',tag:'植木算'});
                } else if(sub===1){
                    const gaps=this.rnd(3,15),interval=this.rnd(2,8),total=gaps*interval;
                    list.push({text:`${total}mの道の両はしに木を植え、${gaps}本の間ができました。何mおきに植えましたか。`,ans:interval,unit:'m',tag:'植木算'});
                } else {
                    const trees=this.rnd(4,16),interval=this.rnd(2,10),total=trees*interval;
                    list.push({text:`まわりが ${total}mの池のまわりに、${interval}mおきに木を植えます。何本いりますか。`,ans:trees,unit:'本',tag:'植木算'});
                }
            } else if(t===1){
                // 等差数列
                const first=this.rnd(1,20), diff=this.rnd(2,10), n=this.rnd(4,8);
                const seq=Array.from({length:n},(_,k)=>first+diff*k);
                const hiddenIdx=this.rnd(1,n-2);
                const ans=seq[hiddenIdx];
                const display=seq.map((v,k)=>k===hiddenIdx?'□':v).join('、');
                list.push({text:`次の数のならびの、□にあてはまる数を答えなさい。\n${display}`,ans,unit:'',tag:'等差数列'});
            } else {
                // 周期算
                const cycleLen=this.rnd(2,5);
                const bases=['○△□','○△○□','△□○△','○○△□','□○△○□'];
                const cycle=bases[cycleLen-2]||bases[0];
                const n=this.rnd(10,25);
                const cycleArr=[...cycle];
                const ans_char=cycleArr[(n-1)%cycleArr.length];
                list.push({text:`「${cycle}」のくり返しがあります。${n}番目の記号は何ですか。`,ans:ans_char,unit:'',tag:'周期算'});
            }
        }
        return list;
    }

    /* 約数 */
    gen_divisor(count){
        const list=[];
        for(let i=0;i<count;i++){
            const t = i % 3;
            if(t===0){
                const n=this.rnd(12,60);
                const divs=[];for(let k=1;k<=n;k++)if(n%k===0)divs.push(k);
                list.push({text:`${n} の約数は全部でいくつありますか。`,ans:divs.length,unit:'個',tag:'約数の個数',divs});
            } else if(t===1){
                const a=this.rnd(12,60), b=this.rnd(12,60);
                const g=this.gcd(a,b);
                list.push({text:`${a} と ${b} の最大公約数を求めなさい。`,ans:g,unit:'',tag:'最大公約数'});
            } else {
                const a=this.rnd(12,48), b=this.rnd(12,48);
                const g=this.gcd(a,b);
                const cds=[];for(let k=1;k<=g;k++)if(g%k===0)cds.push(k);
                list.push({text:`${a} と ${b} の公約数をすべて答えなさい（コンマ区切り）。`,ans:cds.join(','),unit:'',tag:'公約数'});
            }
        }
        return list;
    }

    /* 大きい数・がい数 */
    gen_place(count){
        const list=[];
        for(let i=0;i<count;i++){
            const t=i%4;
            if(t===0){
                const oku=this.rnd(1,9), man=this.rnd(1000,9999); const n=oku*100000000+man*10000;
                list.push({text:`${oku}億${man}万 を数字で書きなさい。`,ans:n,unit:'',tag:'大きい数'});
            } else if(t===1){
                const n=this.rnd(1000000,9999999), ans=Math.floor(n/1000000);
                list.push({text:`${n} の百万の位の数字を答えなさい。`,ans,unit:'',tag:'位取り'});
            } else if(t===2){
                const n=this.rnd(1000,99999), place=[10,100,1000][this.rnd(0,2)]; const ans=Math.round(n/place)*place;
                list.push({text:`${n} を ${place===10?'十':place===100?'百':'千'}の位で四捨五入しなさい。`,ans,unit:'',tag:'がい数'});
            } else {
                const n=this.rnd(10000,99999), unit=[100,1000][this.rnd(0,1)], ans=Math.floor(n/unit)*unit;
                list.push({text:`${n} を ${unit===100?'百':'千'}の位までのがい数にしなさい（切り捨て）。`,ans,unit:'',tag:'がい数'});
            }
        }
        return list;
    }

    /* 単位の変換 */
    gen_unit(count){
        const list=[];
        for(let i=0;i<count;i++){
            const t=i%5;
            if(t===0){ const m=this.rnd(2,9); list.push({text:`${m}m は何cmですか。`,ans:m*100,unit:'cm',tag:'長さ'}); }
            else if(t===1){ const cm=this.rnd(2,9)*100+this.rnd(1,9)*10; list.push({text:`${cm}cm は何m何cmですか。mの数字だけ答えなさい。`,ans:Math.floor(cm/100),unit:'m',tag:'長さ'}); }
            else if(t===2){ const kg=this.rnd(1,9); list.push({text:`${kg}kg は何gですか。`,ans:kg*1000,unit:'g',tag:'重さ'}); }
            else if(t===3){ const l=this.rnd(1,8), dl=this.rnd(1,9); list.push({text:`${l}L${dl}dL は何dLですか。`,ans:l*10+dl,unit:'dL',tag:'かさ'}); }
            else { const km=this.rnd(1,9), m=this.rnd(1,9)*100; list.push({text:`${km}km${m}m は何mですか。`,ans:km*1000+m,unit:'m',tag:'長さ'}); }
        }
        return list;
    }

    /* 表とグラフ */
    gen_graph(count){
        const list=[];
        for(let i=0;i<count;i++){
            const base=this.rnd(18,28);
            const temps=[base,base+this.rnd(1,4),base+this.rnd(3,7),base+this.rnd(2,6)];
            const labels=['9時','12時','15時','18時'];
            const max=Math.max(...temps), min=Math.min(...temps);
            const t=i%4;
            if(t===0) list.push({text:`気温の表：9時 ${temps[0]}℃、12時 ${temps[1]}℃、15時 ${temps[2]}℃、18時 ${temps[3]}℃。いちばん高い気温は何℃ですか。`,ans:max,unit:'℃',tag:'表'});
            else if(t===1) list.push({text:`気温の表：9時 ${temps[0]}℃、12時 ${temps[1]}℃、15時 ${temps[2]}℃、18時 ${temps[3]}℃。いちばん低い気温は何℃ですか。`,ans:min,unit:'℃',tag:'表'});
            else if(t===2) list.push({text:`気温の表：9時 ${temps[0]}℃、12時 ${temps[1]}℃、15時 ${temps[2]}℃、18時 ${temps[3]}℃。最高と最低の差は何℃ですか。`,ans:max-min,unit:'℃',tag:'変化'});
            else { const idx=temps.indexOf(max); list.push({text:`気温の表：9時 ${temps[0]}℃、12時 ${temps[1]}℃、15時 ${temps[2]}℃、18時 ${temps[3]}℃。いちばん高い時刻は？`,ans:labels[idx],unit:'',tag:'表'}); }
        }
        return list;
    }

    /* 直方体と立方体 */
    gen_solid(count){
        const list=[];
        for(let i=0;i<count;i++){
            const t=i%5;
            if(t===0) list.push({text:`直方体の面はいくつありますか。`,ans:6,unit:'面',tag:'直方体'});
            else if(t===1) list.push({text:`直方体の辺はいくつありますか。`,ans:12,unit:'本',tag:'直方体'});
            else if(t===2) list.push({text:`直方体の頂点はいくつありますか。`,ans:8,unit:'こ',tag:'直方体'});
            else if(t===3) list.push({text:`立方体では、すべての辺の長さが等しい。○か×。`,ans:'○',unit:'',tag:'立方体'});
            else list.push({text:`直方体で、向かい合う面は平行である。○か×。`,ans:'○',unit:'',tag:'直方体'});
        }
        return list;
    }

    /* 総合テスト */
    gen_mixed(count){
        const srcs=[
            {layout:'calc',     label:'計算'},
            {layout:'frac',     label:'分数'},
            {layout:'decimal',  label:'小数'},
            {layout:'angle',    label:'角度'},
            {layout:'shapes',   label:'面積'},
            {layout:'sequence', label:'数列'},
            {layout:'divisor',  label:'約数'},
            {layout:'place',    label:'大きい数'},
            {layout:'unit',     label:'単位'},
            {layout:'graph',    label:'表'},
            {layout:'solid',    label:'立体'},
        ];
        const list=[]; let si=0;
        while(list.length<count){
            const src=srcs[si%srcs.length]; si++;
            const pool=this[`gen_${src.layout}`](6);
            if(pool.length){const p=pool[this.rnd(0,pool.length-1)];p._label=src.label;p._layout=src.layout;list.push(p);}
        }
        return this.shuffle(list);
    }

    /* render */
    render(t){
        const l=t.layout, probs=this.problems[t.id];
        if(l==='calc')         this.renderCalc(t.id,probs);
        else if(l==='frac')    this.renderFrac(t.id,probs);
        else if(l==='decimal') this.renderDecimal(t.id,probs);
        else if(l==='angle')   this.renderAngle(t.id,probs);
        else if(l==='shapes')  this.renderShapes(t.id,probs);
        else if(l==='sequence')this.renderStory(t.id,probs);
        else if(l==='divisor') this.renderStory(t.id,probs);
        else if(['place','unit','graph','solid'].includes(l)) this.renderStory(t.id,probs);
        else if(l==='mixed')   this.renderMixed(t.id,probs);
    }

    /* 計算問題：3列 */
    renderCalc(tabId, probs){
        const cols = ['ca','cb','cc'].map(id=>document.getElementById(`${id}-${tabId}`));
        cols.forEach(c=>c.innerHTML='');
        probs.forEach((p,i)=>{
            let aH='';
            if(p.type==='div_rem'){
                aH=`<div class="inp-wrap"><input type="text" class="box bxm" data-ans="${p.ansNum}"><div class="mark"></div></div><span style="font-size:.7rem;margin:0 2px">あまり</span><div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.ansRem}"><div class="mark"></div></div>`;
            } else {
                aH=`<div class="inp-wrap"><input type="text" class="box bxl" data-ans="${p.ans}"><div class="mark"></div></div>`;
            }
            const html=`<div class="prob-h"><span class="prob-num">(${i+1})</span><span style="flex-grow:1;font-size:.9rem">${p.display} ＝</span>${aH}</div>`;
            cols[i%3].insertAdjacentHTML('beforeend',html);
        });
        this.wire(tabId);
    }

    /* 分数 */
    renderFrac(tabId, probs){
        const L=document.getElementById(`ca-${tabId}`),R=document.getElementById(`cb-${tabId}`);
        L.innerHTML='';R.innerHTML='';
        probs.forEach((p,i)=>{
            let aH='';
            if(p.type==='frac_simple'){
                if(p.denAns===1){
                    aH=`<div class="inp-wrap"><input type="text" class="box bxm" data-ans="${p.numAns}"><div class="mark"></div></div>`;
                } else {
                    aH=`<span class="frac"><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.numAns}"><div class="mark"></div></div><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.denAns}"><div class="mark"></div></div></span>`;
                }
            } else {
                if(p.isWhole){
                    aH=`<div class="inp-wrap"><input type="text" class="box bxm" data-ans="${p.whole}"><div class="mark"></div></div>`;
                } else {
                    aH=`<div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.whole}"><div class="mark"></div></div><span class="frac"><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.numAns}"><div class="mark"></div></div><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.denAns}"><div class="mark"></div></div></span>`;
                }
            }
            const html=`<div class="prob-h" style="align-items:center;min-height:3rem"><span class="prob-num">(${i+1})</span><span style="display:inline-flex;align-items:center;gap:2px;flex-wrap:wrap">${p.q} ${aH}</span></div>`;
            (i%2===0?L:R).insertAdjacentHTML('beforeend',html);
        });
        this.wire(tabId);
    }

    /* 小数 */
    renderDecimal(tabId,probs){
        const L=document.getElementById(`ca-${tabId}`),R=document.getElementById(`cb-${tabId}`);
        L.innerHTML='';R.innerHTML='';
        probs.forEach((p,i)=>{
            const opSym = p.op==='+'?'＋':p.op==='-'?'－':p.op==='÷'?'÷':'×';
            const q=`${this.toFW(p.n1)} ${opSym} ${this.toFW(p.n2)} ＝`;
            const html=`<div class="prob-h"><span class="prob-num">(${i+1})</span><span style="margin-right:3px">${q}</span><div class="inp-wrap"><input type="text" class="box bxl" data-ans="${p.ans}"><div class="mark"></div></div></div>`;
            (i%2===0?L:R).insertAdjacentHTML('beforeend',html);
        });
        this.wire(tabId);
    }

    /* 角の大きさ */
    renderAngle(tabId,probs){
        const L=document.getElementById(`ca-${tabId}`),R=document.getElementById(`cb-${tabId}`);
        L.innerHTML='';R.innerHTML='';
        probs.forEach((p,i)=>{
            const html=`<div class="prob-h" style="align-items:flex-start;min-height:3.5rem;padding:5px 0"><span class="prob-num">(${i+1})</span><span style="font-size:.82rem;flex-grow:1;line-height:1.6;padding-right:4px">${p.q}</span><div style="display:flex;align-items:center;gap:3px;flex-shrink:0"><div class="inp-wrap"><input type="text" class="box bxm" data-ans="${p.ans}"><div class="mark"></div></div><span style="font-size:.85rem">°</span></div></div>`;
            (i%2===0?L:R).insertAdjacentHTML('beforeend',html);
        });
        this.wire(tabId);
    }

    /* 三角形 SVG */
    mkTriSVG(p){
        // viewBoxを広げてラベルが絶対にクリップされないようにする
        const W=180,H=120,PAD=28;
        const bx1=PAD,by1=H-PAD,bx2=W-PAD,by2=H-PAD;
        let ax;
        if(p.shape==='right') ax=bx1;
        else if(p.shape==='acute') ax=(bx1+bx2)/2;
        else ax=bx1+(bx2-bx1)*0.22;
        const ay=PAD+4;
        const pts=`${ax},${ay} ${bx1},${by1} ${bx2},${by2}`;
        const rightMark=p.shape==='right'?`<rect x="${bx1}" y="${by1-11}" width="11" height="11" fill="none" stroke="#6366f1" stroke-width="1.4"/>` :'';
        return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block">
            <polygon points="${pts}" fill="#eef2ff" stroke="#6366f1" stroke-width="2" stroke-linejoin="round"/>
            <line x1="${ax}" y1="${ay}" x2="${ax}" y2="${by1}" stroke="#a5b4fc" stroke-width="1.5" stroke-dasharray="4,3"/>
            ${rightMark}
            <text x="${(bx1+bx2)/2}" y="${by1+16}" text-anchor="middle" font-size="11" fill="#1d4ed8" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.base}${p.unit}</text>
            <text x="${ax+7}" y="${(ay+by1)/2+4}" text-anchor="start" font-size="11" fill="#1d4ed8" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.height}${p.unit}</text>
        </svg>`;
    }

    /* 四角形 SVG */
    mkQuadSVG(p){
        // 全図形でoverflow:visible＋PAD拡大して左側ラベルが切れないよう修正
        const W=186,H=120,PAD=32;
        if(p.qtype==='rectangle'){
            const x=PAD,y=PAD-4,w=W-PAD*2+8,h=H-PAD*2+4;
            // たてラベルは左外側に出るので x=PAD の外にテキストを置く
            // text-anchor:end だと clipPath に引っかかるため、座標をSVG内側に移し text-anchor:start で右端表示
            return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block">
                <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
                <text x="${x+w/2}" y="${y+h+15}" text-anchor="middle" font-size="11" fill="#a16207" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.w}${p.unit}</text>
                <text x="${x-4}" y="${y+h/2+4}" text-anchor="end" font-size="11" fill="#a16207" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.h}${p.unit}</text>
            </svg>`;
        } else if(p.qtype==='parallelogram'){
            const off=22;
            const x1=PAD,x2=W-PAD,y1=PAD-2,y2=H-PAD+2;
            const pts=`${x1+off},${y1} ${x2},${y1} ${x2-off},${y2} ${x1},${y2}`;
            return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block">
                <polygon points="${pts}" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
                <line x1="${x2-off}" y1="${y1}" x2="${x2-off}" y2="${y2}" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3"/>
                <text x="${(x1+off+x2)/2}" y="${y2+15}" text-anchor="middle" font-size="11" fill="#15803d" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.base}${p.unit}</text>
                <text x="${x2-off+6}" y="${(y1+y2)/2+4}" text-anchor="start" font-size="11" fill="#15803d" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.height}${p.unit}</text>
            </svg>`;
        } else {
            // 台形
            const bw=W-PAD*2+8, tw=bw*0.58, ox=(bw-tw)/2;
            const x1=PAD, x2=W-PAD+4, tx1=PAD+ox, tx2=PAD+ox+tw;
            const y1=H-PAD+4, y2=PAD+4;
            return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow:visible;display:block">
                <polygon points="${tx1},${y2} ${tx2},${y2} ${x2},${y1} ${x1},${y1}" fill="#fdf4ff" stroke="#9333ea" stroke-width="2"/>
                <line x1="${tx1}" y1="${y2}" x2="${tx1}" y2="${y1}" stroke="#d8b4fe" stroke-width="1.5" stroke-dasharray="4,3"/>
                <text x="${(x1+x2)/2}" y="${y1+15}" text-anchor="middle" font-size="10" fill="#7e22ce" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.a}${p.unit}</text>
                <text x="${(tx1+tx2)/2}" y="${y2-6}" text-anchor="middle" font-size="10" fill="#7e22ce" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.b}${p.unit}</text>
                <text x="${tx1-5}" y="${(y1+y2)/2+4}" text-anchor="end" font-size="10" fill="#7e22ce" font-weight="800" font-family="M PLUS Rounded 1c,sans-serif">${p.h}${p.unit}</text>
            </svg>`;
        }
    }

    /* 図形の面積 render */
    renderShapes(tabId,probs){
        const w=document.getElementById(`wr-${tabId}`);
        w.innerHTML='';
        probs.forEach((p,i)=>{
            let svg='', qText='', formula='';
            if(p.kind==='triangle'){
                svg=this.mkTriSVG(p);
                qText=`三角形の面積を求めなさい。`;
                formula=`底辺 ${p.base}${p.unit}　高さ ${p.height}${p.unit}`;
            } else {
                svg=this.mkQuadSVG(p);
                if(p.qtype==='rectangle'){
                    qText=`長方形の面積を求めなさい。`;
                    formula=`たて ${p.h}${p.unit}　横 ${p.w}${p.unit}`;
                } else if(p.qtype==='parallelogram'){
                    qText=`平行四辺形の面積を求めなさい。`;
                    formula=`底辺 ${p.base}${p.unit}　高さ ${p.height}${p.unit}`;
                } else {
                    qText=`台形の面積を求めなさい。`;
                    formula=`上底 ${p.b}${p.unit}　下底 ${p.a}${p.unit}　高さ ${p.h}${p.unit}`;
                }
            }
            w.insertAdjacentHTML('beforeend',`
                <div class="shape-item">
                    <div class="shape-header">
                        <span class="shape-num">(${i+1})</span>
                        <span class="shape-label">${qText}</span>
                    </div>
                    <div class="shape-figure">${svg}</div>
                    <div class="shape-formula">${formula}</div>
                    <div class="shape-ans">
                        <span style="font-size:.85rem;color:#475569;">面積 ＝</span>
                        <div class="inp-wrap"><input type="text" class="box bxtri" data-ans="${p.ans}"><div class="mark"></div></div>
                        <span style="font-size:.82rem;color:#475569;">${p.unit}²</span>
                    </div>
                </div>
            `);
        });
        this.wire(tabId);
    }

    /* 文章題（植木算・数列・約数など）*/
    renderStory(tabId,probs){
        const w=document.getElementById(`wr-${tabId}`);
        w.innerHTML='';
        probs.forEach((p,i)=>{
            const lines=(p.text||''). split('\n');
            const textHTML=lines.map(l=>`<div>${l}</div>`).join('');
            let aH=`<div class="inp-wrap"><input type="text" class="box bxst" data-ans="${p.ans}"><div class="mark"></div></div>`;
            const unitH=p.unit?`<span style="font-size:.85rem">${p.unit}</span>`:'';
            const tagH=p.tag?`<span style="font-size:.62rem;background:#f0fdf4;color:#15803d;border-radius:6px;padding:1px 7px;font-weight:800;">${p.tag}</span>`:'';
            w.insertAdjacentHTML('beforeend',`
                <div class="prob-story">
                    <div class="prob-badge">${i+1}</div>
                    <div class="story-body">
                        <div class="story-txt">${textHTML}</div>
                        <div class="story-ans">${tagH} こたえ：${aH}${unitH}</div>
                    </div>
                </div>
            `);
        });
        this.wire(tabId);
    }

    /* 総合テスト */
    renderMixed(tabId,probs){
        const w=document.getElementById(`wr-${tabId}`);w.innerHTML='';
        probs.forEach((p,i)=>{
            const l=p._layout, c=this.BADGE[l]||{bg:'#f1f5f9',txt:'#475569'};
            let q='',aH='',uH='';
            if(l==='calc'){
                q=`${p.display} ＝`;
                if(p.type==='div_rem'){
                    aH=`<div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.ansNum}"><div class="mark"></div></div><span style="font-size:.6rem;margin:0 1px">あまり</span><div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.ansRem}"><div class="mark"></div></div>`;
                } else {
                    aH=`<div class="inp-wrap"><input type="text" class="box bxm" data-ans="${p.ans}"><div class="mark"></div></div>`;
                }
            } else if(l==='frac'){
                q=`<span style="display:inline-flex;align-items:center;gap:2px">${p.q}</span>`;
                if(p.type==='frac_simple'&&p.denAns===1){
                    aH=`<div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.numAns}"><div class="mark"></div></div>`;
                } else if(p.type==='frac_simple'){
                    aH=`<span class="frac"><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.numAns}"><div class="mark"></div></div><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.denAns}"><div class="mark"></div></div></span>`;
                } else if(p.isWhole){
                    aH=`<div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.whole}"><div class="mark"></div></div>`;
                } else {
                    aH=`<div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.whole}"><div class="mark"></div></div><span class="frac"><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.numAns}"><div class="mark"></div></div><div class="inp-wrap"><input type="text" class="box bxfrac" data-ans="${p.denAns}"><div class="mark"></div></div></span>`;
                }
            } else if(l==='decimal'){
                const opSym=p.op==='+'?'＋':p.op==='-'?'－':p.op==='÷'?'÷':'×';
                q=`${this.toFW(p.n1)} ${opSym} ${this.toFW(p.n2)} ＝`;
                aH=`<div class="inp-wrap"><input type="text" class="box bxm" data-ans="${p.ans}"><div class="mark"></div></div>`;
            } else if(l==='angle'){
                // 角度問題は問題文を短く要約して表示
                const shortQ = p.q.length>28 ? p.q.substring(0,28)+'…' : p.q;
                q=`${shortQ}`;
                aH=`<div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.ans}"><div class="mark"></div></div>`;
                uH=`<span style="font-size:.78rem">°</span>`;
            } else if(l==='shapes'){
                if(p.kind==='triangle'){
                    q=`△ 底辺${p.base}${p.unit}・高さ${p.height}${p.unit} 面積＝`;
                } else if(p.qtype==='rectangle'){
                    q=`長方形 ${p.h}×${p.w}${p.unit} 面積＝`;
                } else if(p.qtype==='parallelogram'){
                    q=`平行四辺形 底${p.base}・高${p.height}${p.unit} 面積＝`;
                } else {
                    q=`台形 上${p.b}・下${p.a}・高${p.h}${p.unit} 面積＝`;
                }
                aH=`<div class="inp-wrap"><input type="text" class="box bxs" data-ans="${p.ans}"><div class="mark"></div></div>`;
                uH=`<span style="font-size:.72rem">${p.unit}²</span>`;
            } else if(l==='sequence'||l==='divisor'||l==='place'||l==='unit'||l==='graph'||l==='solid'){
                const txt=(p.text||'');
                const shortTxt = txt.length>32 ? txt.substring(0,32)+'…' : txt;
                q=shortTxt.replace(/\n.*/,'');
                aH=`<div class="inp-wrap"><input type="text" class="box bxm" data-ans="${p.ans}"><div class="mark"></div></div>`;
                if(p.unit) uH=`<span style="font-size:.72rem">${p.unit}</span>`;
            }
            w.insertAdjacentHTML('beforeend',`<div class="prob-mixed" id="p${tabId}-${i}" style="flex-wrap:wrap;align-items:center;min-height:2.8rem">
                <span class="prob-num">(${i+1})</span>
                <span class="mbadge" style="background:${c.bg};color:${c.txt}">${p._label}</span>
                <span style="flex-grow:1;font-size:.82rem;display:inline-flex;align-items:center;gap:2px;flex-wrap:wrap;min-width:0">${q}</span>
                <span style="display:inline-flex;align-items:center;gap:2px;flex-shrink:0">${aH}${uH}</span>
            </div>`);
        });
        this.wire(tabId);
    }

    /* wire inputs */
    wire(tabId){
        const inputs=document.querySelectorAll(`#sheet-${tabId} input.box`);
        inputs.forEach((inp,i)=>{
            inp.addEventListener('input',e=>{
                const ans=inp.dataset.ans||'';
                let v=e.target.value.replace(/[０-９．]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));
                if(!/[^0-9.,.]/.test(ans)) v=v.replace(/[^0-9.,]/g,'');
                if(e.target.value!==v)e.target.value=v;
                inp.classList.remove('correct','incorrect');
                const m=inp.parentElement.querySelector('.mark');if(m)m.classList.remove('show');
            });
            inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){if(inputs[i+1])inputs[i+1].focus();else inp.blur();} });
        });
    }

    /* check */
    checkAnswers(){
        const tabId=this.tab;
        const inputs=document.querySelectorAll(`#sheet-${tabId} input.box`);
        let correct=0,total=0,allDone=true;
        inputs.forEach(inp=>{
            total++;
            const ans=String(inp.dataset.ans||'').trim();
            const val=inp.value.trim().replace(/[０-９．]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0));
            if(!val){allDone=false;return;}
            inp.classList.remove('correct','incorrect');
            const m=inp.parentElement.querySelector('.mark');if(m)m.classList.remove('show');
            let ok=false;
            if(ans.includes(',')){
                const aSet=new Set(ans.split(',').map(s=>s.trim()));
                const vSet=new Set(val.split(',').map(s=>s.trim()));
                ok=aSet.size===vSet.size && [...aSet].every(x=>vSet.has(x));
            } else if(/[○△□]/.test(ans)){
                ok=val===ans;
            } else {
                ok=(parseFloat(val)===parseFloat(ans))||(val===ans);
            }
            if(ok){inp.classList.add('correct');if(m)m.classList.add('show');correct++;}
            else inp.classList.add('incorrect');
        });
        const score=Math.round(correct/total*100);
        document.getElementById(`sc-${tabId}`).textContent=score;
        this.showModal(score,allDone);
    }

    showModal(score,allDone){
        document.getElementById('modal-score').textContent=score+'点';
        const m=document.getElementById('modal-msg');
        if(!allDone)m.innerHTML='まだといていない<br>もんだいがあるよ！';
        else if(score===100){m.innerHTML='パーフェクト！✨<br>すごい！';this.startConfetti();this.playFanfare();}
        else if(score>=80)m.innerHTML='おしい！<br>あとちょっと！';
        else m.innerHTML='あきらめずに<br>がんばろう！';
        document.getElementById('modal-overlay').classList.add('on');
    }
    closeModal(){
        document.getElementById('modal-overlay').classList.remove('on');
        this.stopConfetti();
    }

    _buildPrint(mode){
        const area=document.getElementById('print-area');area.innerHTML='';
        this.TABS.forEach(t=>{
            const src=document.getElementById(`sheet-${t.id}`);
            const clone=src.cloneNode(true);
            clone.className=`print-sheet ${mode==='answer'?'a-mode':'q-mode'}`;
            clone.id='';clone.removeAttribute('style');
            if(mode==='answer') clone.querySelectorAll('input.box').forEach(inp=>{
                const raw = String(inp.dataset.ans || '');
                const answer = raw.replace(/\|/g, ' / ');
                const label = document.createElement('span');
                label.className = 'answer-text' + (answer.length > 9 ? ' xlong' : (answer.length > 4 ? ' long' : ''));
                label.textContent = answer;
                const wrap = inp.closest('.inp-wrap');
                if(wrap) wrap.replaceWith(label);
                else inp.replaceWith(label);
            });
            area.appendChild(clone);
        });
    }
    printQuestion(){ this._buildPrint('question'); window.print(); }
    printAnswer()  { this._buildPrint('answer');   window.print(); }

    saveImage(){
        const tabId=this.tab;
        html2canvas(document.getElementById(`sheet-${tabId}`),{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{
            const a=document.createElement('a');a.download=`grade4-math_tab${tabId}.png`;a.href=canvas.toDataURL('image/png');a.click();
        });
    }

    getAudio(){ if(!this.audioCtx)this.audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(this.audioCtx.state==='suspended')this.audioCtx.resume(); return this.audioCtx; }
    playTone(f,d,type='sine',s=0){ const ctx=this.getAudio(),o=ctx.createOscillator(),g=ctx.createGain(); o.type=type;o.frequency.setValueAtTime(f,ctx.currentTime+s);g.gain.setValueAtTime(0.12,ctx.currentTime+s);g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+s+d);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d); }
    playFanfare(){ [523,659,784,1047].forEach((f,i)=>this.playTone(f,.2,'square',i*.2)); }

    setupConfetti(){ this.cc=document.getElementById('confetti-canvas');this.cx=this.cc.getContext('2d');this.cp=[];this.ca=false;this.resizeCanvas(); }
    resizeCanvas(){ if(this.cc){this.cc.width=window.innerWidth;this.cc.height=window.innerHeight;} }
    startConfetti(){ this.ca=true;this.cp=Array.from({length:140},()=>({x:Math.random()*window.innerWidth,y:-20,r:Math.random()*5+3,d:Math.random()*8+4,color:`hsl(${Math.random()*360},75%,62%)`,tilt:0,ta:0,ts:Math.random()*.08+.04}));this._animConf(); }
    _animConf(){ if(!this.ca)return;this.cx.clearRect(0,0,this.cc.width,this.cc.height);this.cp.forEach(p=>{p.ta+=p.ts;p.y+=p.d*.45;p.tilt=Math.sin(p.ta)*12;this.cx.beginPath();this.cx.lineWidth=p.r;this.cx.strokeStyle=p.color;this.cx.moveTo(p.x+p.tilt+p.r/4,p.y);this.cx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/4);this.cx.stroke();});this.cp=this.cp.filter(p=>p.y<this.cc.height+20);if(this.cp.length>0)requestAnimationFrame(()=>this._animConf());else{this.cx.clearRect(0,0,this.cc.width,this.cc.height);this.ca=false;} }
    stopConfetti(){ this.ca=false;if(this.cx)this.cx.clearRect(0,0,this.cc.width,this.cc.height); }
}

const app = new MathApp();
</script>
